global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    cluster: aura-cx

scrape_configs:
  # FastAPI backend metrics
  - job_name: 'aura-cx-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Alert rules for production monitoring
rule_files: []

# Rule group definitions (import from monitoring/alert-rules.yml)
# rule_files:
#   - /etc/prometheus/alert-rules.yml
