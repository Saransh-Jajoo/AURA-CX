  <text x="76" y="32" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="28" fill="white" letter-spacing="-0.5">AURA</text>
  <text x="76" y="32" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="28" fill="url(#logo-grad)" letter-spacing="-0.5" opacity="0.7">AURA</text>
  <text x="168" y="32" font-family="Inter, system-ui, sans-serif" font-weight="300" font-size="28" fill="#94a3b8" letter-spacing="-0.5">-CX</text>
  <text x="76" y="52" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="10" fill="#64748b" letter-spacing="3">COMMAND CENTER</text>
