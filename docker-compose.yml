services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aura_cx
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: aura
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura -d aura_cx"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
    environment:
      USE_MOCK_DATA: "false"
      ENVIRONMENT: production
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql+asyncpg://aura:aura@postgres:5432/aura_cx
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-change-before-production-1234567890}
      BOOTSTRAP_TENANT_ID: ${BOOTSTRAP_TENANT_ID:-tenant-default}
      BOOTSTRAP_TENANT_NAME: ${BOOTSTRAP_TENANT_NAME:-AURA-CX Workspace}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-ChangeMeNow12345}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-pro-latest}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-text-embedding-004}
      VECTOR_PROVIDER: ${VECTOR_PROVIDER:-chroma}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_HOST: ${PINECONE_HOST:-}
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-aura_cx}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-change-before-production-1234567890}
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  chroma-data:
