services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aura_cx
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: "${DB_PASSWORD:?ERROR: DB_PASSWORD must be set}"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura -d aura_cx"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    command: 'redis-server --requirepass ${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD must be set} --maxmemory 256mb --maxmemory-policy allkeys-lru'
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD must be set}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      ALLOW_RESET: "true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Reverse proxy with security headers and rate limiting
  nginx:
    image: nginx:1.25-alpine
    container_name: aura-cx-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/:/etc/nginx/certs:ro  # Mount SSL certificates when available
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    environment:
      USE_MOCK_DATA: "false"
      ENVIRONMENT: production
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: "postgresql+asyncpg://aura:${DB_PASSWORD:?ERROR: DB_PASSWORD must be set}@postgres:5432/aura_cx"
      SECRET_KEY: "${SECRET_KEY:?ERROR: SECRET_KEY must be set in environment}"
      BOOTSTRAP_TENANT_ID: "${BOOTSTRAP_TENANT_ID:?ERROR: BOOTSTRAP_TENANT_ID must be set}"
      BOOTSTRAP_TENANT_NAME: "${BOOTSTRAP_TENANT_NAME:?ERROR: BOOTSTRAP_TENANT_NAME must be set}"
      BOOTSTRAP_ADMIN_EMAIL: "${BOOTSTRAP_ADMIN_EMAIL:?ERROR: BOOTSTRAP_ADMIN_EMAIL must be set}"
      BOOTSTRAP_ADMIN_PASSWORD: "${BOOTSTRAP_ADMIN_PASSWORD:?ERROR: BOOTSTRAP_ADMIN_PASSWORD must be set}"
      WEBHOOK_SIGNING_SECRET: "${WEBHOOK_SIGNING_SECRET:?ERROR: WEBHOOK_SIGNING_SECRET must be set}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:?ERROR: GEMINI_API_KEY must be set}"
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-pro-latest}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-text-embedding-004}
      VECTOR_PROVIDER: ${VECTOR_PROVIDER:-chroma}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_HOST: ${PINECONE_HOST:-}
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-aura_cx}
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:?ERROR: STRIPE_SECRET_KEY must be set}"
      STRIPE_PRICE_STARTER: "${STRIPE_PRICE_STARTER:?ERROR: STRIPE_PRICE_STARTER must be set}"
      STRIPE_PRICE_PRO: "${STRIPE_PRICE_PRO:?ERROR: STRIPE_PRICE_PRO must be set}"
      STRIPE_PRICE_ENTERPRISE: "${STRIPE_PRICE_ENTERPRISE:?ERROR: STRIPE_PRICE_ENTERPRISE must be set}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:?ERROR: ENCRYPTION_KEY must be set}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD must be set}@redis:6379/0"
      CELERY_BROKER_URL: "redis://:${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD must be set}@redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://:${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD must be set}@redis:6379/2"
      TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID:?ERROR: TWILIO_ACCOUNT_SID must be set}"
      TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN:?ERROR: TWILIO_AUTH_TOKEN must be set}"
      TWILIO_PHONE_NUMBER: "${TWILIO_PHONE_NUMBER:?ERROR: TWILIO_PHONE_NUMBER must be set}"
      SUPPORTED_LANGUAGES: ${SUPPORTED_LANGUAGES:-en,hi,mr,ta,bn,gu,te,kn,ml}
      # Monitoring
      PROMETHEUS_ENABLED: "true"
      ENABLE_RATE_LIMITING: "true"
      AUDIT_LOG_ENABLED: "true"
      LOG_API_CALLS: "true"
      LOG_DATA_ACCESS: "true"
    ports:
      - "8000:8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000/api
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
    ports:
      - "3000:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────
  # MONITORING STACK: Prometheus + Grafana + Loki
  # ─────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: aura-cx-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:10.3.0
    container_name: aura-cx-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:?ERROR: GRAFANA_PASSWORD must be set}"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel,grafana-worldmap-panel"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: grafana/loki:2.9.0
    container_name: aura-cx-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:
  redis-data:
  chroma-data:
  prometheus-data:
  grafana-data:
  loki-data:

